<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | Emilio Tahara</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&display=swap" rel="stylesheet">
</head>
<body class="admin-body">
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">ET<span class="accent">_</span>Admin</div>
            <nav class="sidebar-nav">
                <a href="#dashboard" class="nav-item active" data-section="dashboard">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Dashboard
                </a>
                <a href="#projects" class="nav-item" data-section="projects">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
                    Projetos
                </a>
                <a href="#blog" class="nav-item" data-section="blog">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                    Blog
                </a>
                <a href="#users" class="nav-item" data-section="users">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    Usuários
                </a>
                <a href="#questions" class="nav-item" data-section="questions">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    Perguntas
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="btn-logout">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Sair
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <header class="admin-header">
                <h1>Painel de Controle</h1>
                <div class="user-info">
                    <span id="adminNameDisplay">Administrador</span>
                </div>
            </header>

            <div id="contentSections">
                <!-- Dashboard Overview -->
                <section id="dashboardSection" class="admin-section active">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <h3>Total Usuários</h3>
                            <p id="statUsers">0</p>
                        </div>
                        <div class="stat-card">
                            <h3>Projetos Ativos</h3>
                            <p id="statProjects">0</p>
                        </div>
                        <div class="stat-card">
                            <h3>Perguntas Pendentes</h3>
                            <p id="statQuestions">0</p>
                        </div>
                    </div>
                </section>

                <!-- Projects Management -->
                <section id="projectsSection" class="admin-section">
                    <div class="section-header">
                        <h2>Gerenciador de Projetos</h2>
                        <button class="btn-primary" id="openAddProjectModal">Novo Projeto</button>
                    </div>
                    <div class="data-table-container">
                        <table id="projectsTable">
                            <thead>
                                <tr>
                                    <th>Título</th>
                                    <th>Data</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody id="projectsListBody">
                                <!-- Data injected via JS -->
                            </tbody>
                        </table>
                    </div>
                </section>

                <!-- Blog Management -->
                <section id="blogSection" class="admin-section">
                    <div class="section-header">
                        <h2>Artigos do Blog</h2>
                        <button class="btn-primary" id="openAddBlogModal">Novo Post</button>
                    </div>
                    <div id="blogList" class="data-grid">
                        <!-- Blog cards injected via JS -->
                    </div>
                </section>

                <!-- Users Management -->
                <section id="usersSection" class="admin-section">
                    <h2>Usuários Cadastrados</h2>
                    <div class="data-table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Nome</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody id="usersListBody">
                                <!-- Data injected via JS -->
                            </tbody>
                        </table>
                    </div>
                </section>

                <!-- Questions Management -->
                <section id="questionsSection" class="admin-section">
                    <h2>Perguntas Privadas</h2>
                    <div id="questionsList" class="questions-container">
                        <!-- Questions injected via JS -->
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="projectModal" class="modal">
        <div class="modal-content">
            <h2 id="projectModalTitle">Novo Projeto</h2>
            <form id="projectForm">
                <input type="hidden" id="projectId">
                <div class="form-group">
                    <label>Título</label>
                    <input type="text" id="projectTitle" required>
                </div>
                <div class="form-group">
                    <label>Tags (separadas por vírgula)</label>
                    <input type="text" id="projectTags" placeholder="Python, IA, Automação">
                </div>
                <div class="form-group">
                    <label>Contexto (O Contexto)</label>
                    <textarea id="projectContext" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Solução (A Solução)</label>
                    <textarea id="projectSolution" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Impacto (O Impacto)</label>
                    <textarea id="projectImpact" rows="3"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary closeModal">Cancelar</button>
                    <button type="submit" class="btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
